<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINee WORLD VIII 週邊採買預算試算工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-6 text-center bg-gradient-to-r from-teal-500 to-cyan-600 p-6 rounded-2xl text-white shadow-md">
            <h1 class="text-2xl md:text-3xl font-bold mb-2">💎 SHINee WORLD VIII 首爾場週邊採買預算試算</h1>
            <p class="text-teal-50 opacity-90">調整各品項購買數量，系統會自動、即時地為您更新採購預算與分類統計。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-gradient-to-br from-teal-50 to-emerald-50 border border-teal-100 p-4 rounded-xl shadow-sm">
                <div class="flex items-start gap-3">
                    <span class="text-2xl">📦</span>
                    <div>
                        <h4 class="font-bold text-teal-900 text-sm md:text-base">▶ 線上訂會場取 (Berriz)</h4>
                        <p class="text-xs text-teal-700 mt-0.5">時間：2026. 05. 28 (THU) 15:00 ~ 05. 31 (SUN) 14:30 [KST]</p>
                        <a href="https://shop.berriz.in/collection/5ithiq9hwq" target="_blank" class="inline-flex items-center text-xs font-semibold text-teal-600 hover:text-teal-800 mt-2 underline break-all bg-white px-2 py-1 rounded shadow-sm">
                            前往 Berriz 購買賣場 ↗
                        </a>
                    </div>
                </div>
            </div>
            <div class="bg-gradient-to-br from-cyan-50 to-blue-50 border border-cyan-100 p-4 rounded-xl shadow-sm">
                <div class="flex items-start gap-3">
                    <span class="text-2xl">🚚</span>
                    <div>
                        <h4 class="font-bold text-cyan-900 text-sm md:text-base">▶ 線上訂八月出貨 (一般預購)</h4>
                        <p class="text-xs text-cyan-700 mt-0.5">時間：2026. 05. 28 (THU) 15:00 ~ 06. 07 (SUN) 23:59 [KST]</p>
                        <a href="http://linktr.ee/SHINee_merch" target="_blank" class="inline-flex items-center text-xs font-semibold text-cyan-600 hover:text-cyan-800 mt-2 underline break-all bg-white px-2 py-1 rounded shadow-sm">
                            前往 官方 Linktree 連結 ↗
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex flex-wrap items-center justify-between gap-4 mb-6 pb-4 border-b border-slate-100">
                    <h2 class="text-xl font-bold text-slate-700">🛍️ 週邊品項清單</h2>
                    <div class="flex gap-2">
                        <button onclick="filterItems('all')" id="btn-all" class="px-3 py-1 text-sm font-medium rounded-full bg-teal-500 text-white shadow-sm transition">全部</button>
                        <button onclick="filterItems('onsite')" id="btn-onsite" class="px-3 py-1 text-sm font-medium rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition">現場/線上同步</button>
                        <button onclick="filterItems('preorder')" id="btn-preorder" class="px-3 py-1 text-sm font-medium rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition">預購限定</button>
                    </div>
                </div>

                <div id="items-container" class="space-y-4">
                    </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-700 mb-4">⚙️ 匯率與參數設定</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-500 mb-1">自訂韓元匯率</label>
                            <input type="number" id="exchange-rate" value="0.024" step="0.0001" oninput="calculateTotal()" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="oversea-fee" onchange="calculateTotal()" class="h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 rounded">
                            <label for="oversea-fee" class="ml-2 block text-sm text-slate-600">包含海外刷卡手續費 1.5%</label>
                        </div>
                    </div>
                </div>

                <div class="bg-gradient-to-b from-slate-800 to-slate-900 p-6 rounded-2xl text-white shadow-md sticky top-4">
