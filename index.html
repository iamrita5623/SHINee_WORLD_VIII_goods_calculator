<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINee SW8 [THE INVERT] 2nd MD 智慧預算試算表</title>
    <style>
        :root {
            --mint-primary: #a3e2c9;
            --mint-light: #e8f8f2;
            --mint-dark: #76c7a6;
            --charcoal-dark: #2c302e;
            --charcoal-light: #4a4e4b;
            --text-color: #333333;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f5;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--mint-primary);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        header h1 {
            color: var(--charcoal-dark);
            font-size: 24px;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }

        header p {
            color: var(--charcoal-light);
            margin: 0;
            font-size: 14px;
        }

        .control-panel {
            background-color: var(--mint-light);
            border: 1px solid var(--mint-primary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .currency-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .currency-btn {
            background-color: var(--white);
            border: 1px solid var(--mint-dark);
            color: var(--charcoal-dark);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .currency-btn.active {
            background-color: var(--charcoal-dark);
            border-color: var(--charcoal-dark);
            color: var(--white);
        }

        .rates-config {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--charcoal-light);
            align-items: center;
        }

        .rates-config input {
            width: 70px;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            text-align: left;
        }

        th {
            background-color: var(--charcoal-dark);
            color: var(--white);
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #eeeeee;
            font-size: 14px;
            vertical-align: middle;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .img-container {
            display: flex;
            gap: 4px;
        }

        .thumb-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            background-color: #fafafa;
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-name {
            font-weight: bold;
            color: var(--charcoal-dark);
        }

        .item-spec {
            font-size: 12px;
            color: #777;
            margin-top: 2px;
        }

        .quantity-input {
            width: 55px;
            padding: 6px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            text-align: center;
        }

        .buy-link {
            display: inline-block;
            background-color: var(--mint-light);
            color: #27ae60;
            padding: 5px 10px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid var(--mint-primary);
            transition: background 0.2s;
        }

        .buy-link:hover {
            background-color: var(--mint-primary);
            color: var(--charcoal-dark);
        }

        .summary-card {
            background-color: var(--charcoal-dark);
            color: var(--white);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
        }

        .summary-item .label {
            font-size: 13px;
            color: var(--mint-primary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .summary-item .value {
            font-size: 24px;
            font-weight: bold;
        }

        .summary-item .sub-value {
            font-size: 12px;
            color: #b0b5b2;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .product-cell { flex-direction: column; align-items: flex-start; gap: 8px; }
            td, th { padding: 10px 6px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SHINee WORLD VIII [THE INVERT] 2nd MD 試算表</h1>
        <p>多幣別即時換算 ‧ 完整圖像化預算小幫手</p>
    </header>

    <div class="control-panel">
        <div class="currency-selector">
            <strong>切換顯示貨幣：</strong>
            <button class="currency-btn active" onclick="changeCurrency('TWD')">新台幣 (TWD)</button>
            <button class="currency-btn" onclick="changeCurrency('HKD')">港幣 (HKD)</button>
            <button class="currency-btn" onclick="changeCurrency('JPY')">日幣 (JPY)</button>
        </div>
        <div class="rates-config">
            <span>自訂韓元匯率 ➡️ </span>
            <label>TWD: <input type="number" id="rate-TWD" value="0.024" step="0.0001" oninput="updateCalculations()"></label>
            <label>HKD: <input type="number" id="rate-HKD" value="0.0058" step="0.0001" oninput="updateCalculations()"></label>
            <label>JPY: <input type="number" id="rate-JPY" value="0.112" step="0.001" oninput="updateCalculations()"></label>
            <span style="color: #777;">(預設基準：1 韓元換算值)</span>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th style="width: 40%;">商品與小卡預覽</th>
                    <th style="width: 15%;">韓元單價</th>
                    <th style="width: 15%;" id="currency-th-title">預估台幣</th>
                    <th style="width: 10%; text-align: center;">數量</th>
                    <th style="width: 10%; text-align: center;">購買</th>
                    <th style="width: 10%; text-align: right;">小計 (₩)</th>
                </tr>
            </thead>
            <tbody id="mdTableBody">
                <!-- 由 JS 動態代入品項 -->
            </tbody>
        </table>
    </div>

    <div class="summary-card">
        <div class="summary-item">
            <span class="label">總計金額 (KRW)</span>
            <span class="value" id="totalKrw">₩0</span>
            <span class="sub-value" id="bonusInfo">未達滿額小卡門檻</span>
        </div>
        <div class="summary-item">
            <span class="label">切換幣別總計</span>
            <span class="value" id="totalConverted" style="color: var(--mint-primary);">$0 TWD</span>
            <span class="sub-value">*未包含海外運費與海外刷卡手續費</span>
        </div>
        <div class="summary-item">
            <span class="label">預估獲得特典卡總數</span>
            <span class="value" id="totalCards" style="color: #ff7675;">0 張</span>
            <span class="sub-value" id="cardDetail">明細：本體 0 + 滿額 0</span>
        </div>
    </div>
</div>

<script>
    // 匯率與貨幣全域狀態
    let currentCurrency = 'TWD';
    
    // 清純化官方 12 款品項數據，拿掉括號備註，並保留圖片路徑與連結位置
    const mdItems = [
        { id: 1, name: "WIND BREAKER SET", spec: "薄荷綠連帽風衣組", price: 120000, hasCard: true, imgProd: "images/prod_wind.jpg", imgCard: "images/card_wind.jpg" },
        { id: 2, name: "SHORT PANTS SET", spec: "薄荷綠休閒短褲組", price: 48000, hasCard: true, imgProd: "images/prod_pants.jpg", imgCard: "images/card_pants.jpg" },
        { id: 3, name: "CROSS BAG", spec: "銀灰色防潑水半月斜背包", price: 45000, hasCard: false, imgProd: "images/prod_bag.jpg", imgCard: "" },
        { id: 4, name: "T-SHIRT SET", spec: "純白排汗短袖T恤組", price: 45000, hasCard: true, imgProd: "images/prod_tshirt.jpg", imgCard: "images/card_tshirt.jpg" },
        { id: 5, name: "FABRIC POSTER SET", spec: "大布海報組", price: 32000, hasCard: true, imgProd: "images/prod_poster.jpg", imgCard: "images/card_poster.jpg" },
        { id: 6, name: "DIY SUN CATCHER SET", spec: "手作太陽捕捉器", price: 25000, hasCard: true, imgProd: "images/prod_suncatcher.jpg", imgCard: "images/card_suncatcher.jpg" },
        { id: 7, name: "RAINBOW 10CM DOLL", spec: "彩虹版絨毛玩偶", price: 22000, hasCard: false, imgProd: "images/prod_doll.jpg", imgCard: "" },
        { id: 8, name: "WATER BALL", spec: "角色漂浮水晶球", price: 18000, hasCard: false, imgProd: "images/prod_wball.jpg", imgCard: "" },
        { id: 9, name: "RANDOM SUNSHINE DOLL KEYRING", spec: "隨機角色果凍鑰匙圈", price: 15000, hasCard: false, imgProd: "images/prod_keyring.jpg", imgCard: "" },
        { id: 10, name: "SCRUNCHIE", spec: "薄荷綠大腸髮圈", price: 11000, hasCard: false, imgProd: "images/prod_scrunchie.jpg", imgCard: "" },
        { id: 11, name: "RANDOM TRADING CARD SET", spec: "隨機明星小卡盲盒", price: 6000, hasCard: false, imgProd: "images/prod_trcard.jpg", imgCard: "" },
        { id: 12, name: "4X6 PHOTO SET", spec: "4X6大照片寫真組", price: 5000, hasCard: false, imgProd: "images/prod_photo.jpg", imgCard: "" }
    ];

    const tableBody = document.getElementById('mdTableBody');

    // 初始化動態渲染表格
    function renderTable() {
        tableBody.innerHTML = '';
        mdItems.forEach(item => {
            const row = document.createElement('tr');
            
            // 預留圖片區塊：如果沒有小卡圖片就不顯示小卡預覽格
            const cardImgHtml = item.hasCard ? `<img src="${item.imgCard}" alt="小卡" class="thumb-img" onerror="this.style.display='none'">` : '';
            
            row.innerHTML = `
                <td>
                    <div class="product-cell">
                        <div class="img-container">
                            <img src="${item.imgProd}" alt="商品" class="thumb-img" onerror="this.style.display='none'">
                            ${cardImgHtml}
                        </div>
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            <span class="item-spec">${item.spec}</span>
                        </div>
                    </div>
                </td>
                <td>₩${item.price.toLocaleString()}</td>
                <td id="converted-price-${item.id}">$0</td>
                <td style="text-align: center;">
                    <input type="number" class="quantity-input" id="qty-${item.id}" value="0" min="0" oninput="updateCalculations()">
                </td>
                <td style="text-align: center;">
                    <a href="https://linktr.ee/SHINee_merch" target="_blank" class="buy-link">購買</a>
                </td>
                <td style="text-align: right; font-weight: 500;" id="subtotal-${item.id}">₩0</td>
            `;
            tableBody.appendChild(row);
        });
        updateCalculations();
    }

    // 切換目標顯示貨幣
    function changeCurrency(currencyCode) {
        currentCurrency = currencyCode;
        
        // 切換按鈕 active 樣式
        document.querySelectorAll('.currency-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        // 更新表頭標題文字
        const titleMap = { 'TWD': '預估台幣', 'HKD': '預估港幣', 'JPY': '預估日幣' };
        document.getElementById('currency-th-title').innerText = titleMap[currencyCode];
        
        updateCalculations();
    }

    // 核心匯率與小卡累增防線運算
    function updateCalculations() {
        const rate = parseFloat(document.getElementById(`rate-${currentCurrency}`).value) || 0;
        let totalKrw = 0;
        let builtInCards = 0;

        mdItems.forEach(item => {
            const qtyInput = document.getElementById(`qty-${item.id}`);
            const qty = parseInt(qtyInput.value) || 0;
            if (qty < 0) qtyInput.value = 0;

            // 計算當前貨幣單價
            const convertedPrice = Math.round(item.price * rate * 100) / 100; // 保留兩位小數或四捨五入
            const displayPrice = currentCurrency === 'JPY' ? Math.round(item.price * rate) : convertedPrice;
            document.getElementById(`converted-price-${item.id}`).innerText = `${currentCurrency === 'JPY' ? '¥' : '$'}${displayPrice.toLocaleString()}`;

            // 計算韓元小計
            const subtotal = item.price * qty;
            totalKrw += subtotal;
            document.getElementById(`subtotal-${item.id}`).innerText = `₩${subtotal.toLocaleString()}`;

            // 統計本體卡
            if (item.hasCard) {
                builtInCards += qty;
            }
        });

        // 滿 70,000 韓元累贈 1 張線上特典卡
        const bonusCards = Math.floor(totalKrw / 70000);
        const totalCards = builtInCards + bonusCards;
        
        // 總和換算貨幣計算
        let totalConvertedValue = totalKrw * rate;
        if (currentCurrency === 'JPY' || currentCurrency === 'TWD') {
            totalConvertedValue = Math.round(totalConvertedValue);
        } else {
            totalConvertedValue = totalConvertedValue.toFixed(2);
        }

        // 更新底端看版
        document.getElementById('totalKrw').innerText = `₩${totalKrw.toLocaleString()}`;
        document.getElementById('totalConverted').innerText = `${currentCurrency === 'JPY' ? '¥' : '$'}${Number(totalConvertedValue).toLocaleString()} ${currentCurrency}`;
        document.getElementById('totalCards').innerText = `${totalCards} 張`;

        // 滿額卡進度條提示文字
        const bonusInfoText = document.getElementById('bonusInfo');
        if (totalKrw === 0) {
            bonusInfoText.innerText = "未達滿額小卡門檻";
        } else if (totalKrw < 70000) {
            const nextLevel = 70000 - totalKrw;
            bonusInfoText.innerText = `還差 ₩${nextLevel.toLocaleString()} 即可多拿 1 張滿額特別卡！`;
        } else {
            const nextLevel = 70000 - (totalKrw % 70000);
            bonusInfoText.innerText = `🎉 已達門檻！再湊 ₩${nextLevel.toLocaleString()} 多送 1 張線上卡！`;
        }

        document.getElementById('cardDetail').innerText = `明細：商品內附卡 ${builtInCards} 張 + 線上滿額贈卡 ${bonusCards} 張`;
    }

    // 頁面啟動
    renderTable();
</script>

</body>
</html>
