<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHINee SW8 [THE INVERT] 2nd MD 預算試算表</title>
    <style>
        :root {
            --mint-primary: #a3e2c9;
            --mint-light: #e8f8f2;
            --mint-dark: #76c7a6;
            --charcoal-dark: #2c302e;
            --charcoal-light: #4a4e4b;
            --text-color: #333333;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f5;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--mint-primary);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        header h1 {
            color: var(--charcoal-dark);
            font-size: 24px;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }

        header p {
            color: var(--charcoal-light);
            margin: 0;
            font-size: 14px;
        }

        .exchange-rate-box {
            background-color: var(--mint-light);
            border: 1px solid var(--mint-primary);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .exchange-rate-box label {
            font-weight: bold;
            color: var(--charcoal-dark);
        }

        .exchange-rate-box input {
            padding: 6px 10px;
            border: 1px solid var(--mint-dark);
            border-radius: 4px;
            width: 80px;
            text-align: center;
            font-size: 14px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            text-align: left;
        }

        th {
            background-color: var(--charcoal-dark);
            color: var(--white);
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        th:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        th:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #eeeeee;
            font-size: 14px;
            vertical-align: middle;
        }

        .item-name {
            font-weight: bold;
            color: var(--charcoal-dark);
        }

        .item-spec {
            font-size: 12px;
            color: #777;
            margin-top: 4px;
        }

        .quantity-input {
            width: 60px;
            padding: 6px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            text-align: center;
        }

        .quantity-input:focus {
            outline: none;
            border-color: var(--mint-dark);
            box-shadow: 0 0 0 2px var(--mint-light);
        }

        .summary-card {
            background-color: var(--charcoal-dark);
            color: var(--white);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
        }

        .summary-item .label {
            font-size: 13px;
            color: var(--mint-primary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .summary-item .value {
            font-size: 24px;
            font-weight: bold;
        }

        .summary-item .sub-value {
            font-size: 12px;
            color: #b0b5b2;
            margin-top: 4px;
        }

        .bonus-badge {
            background-color: #ff7675;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 16px; }
            th, td { padding: 10px 6px; font-size: 13px; }
            .summary-card { grid-template-columns: 1fr; gap: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SHINee WORLD VIII [THE INVERT] 2nd MD 試算表</h1>
        <p>夢幻薄荷綠夏日遠征 ‧ 專屬預算與滿額特典計算工具</p>
    </header>

    <div class="exchange-rate-box">
        <div>
            <strong>💡 特典提醒：</strong> 線上單筆滿 70,000 ₩ 即可累贈 1 張特別版自拍小卡（可完全累贈）
        </div>
        <div>
            <label for="rateInput">設定當前匯率：</label>
            <input type="number" id="rateInput" value="0.024" step="0.0001" oninput="calculateTotal()">
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th style="width: 45%;">週邊品項</th>
                    <th style="width: 15%;">韓元單價</th>
                    <th style="width: 15%;">預估台幣</th>
                    <th style="width: 15%; text-align: center;">數量</th>
                    <th style="width: 10%; text-align: right;">小計 (₩)</th>
                </tr>
            </thead>
            <tbody id="mdTableBody">
                <!-- 由 JavaScript 動態生成品項 -->
            </tbody>
        </table>
    </div>

    <div class="summary-card">
        <div class="summary-item">
            <span class="label">總計金額 (KRW)</span>
            <span class="value" id="totalKrw">₩0</span>
            <span class="sub-value" id="bonusInfo">未達滿額小卡門檻</span>
        </div>
        <div class="summary-item">
            <span class="label">估算總計 (TWD)</span>
            <span class="value" id="totalTwd" style="color: var(--mint-primary);">$0</span>
            <span class="sub-value">*不含海外運費與刷卡手續費</span>
        </div>
        <div class="summary-item">
            <span class="label">預估獲得特典卡數量</span>
            <span class="value" id="totalCards" style="color: #ff7675;">0 張</span>
            <span class="sub-value" id="cardDetail">包含滿額卡與自帶卡</span>
        </div>
    </div>
</div>

<script>
    // 嚴謹代入官方公告的 12 款品項數據
    const mdItems = [
        { id: 1, name: "WIND BREAKER SET", spec: "薄荷綠連帽風衣組 (自帶專屬小卡x1)", price: 120000, hasCard: true },
        { id: 2, name: "SHORT PANTS SET", spec: "薄荷綠休閒短褲組 (自帶專屬小卡x1)", price: 48000, hasCard: true },
        { id: 3, name: "CROSS BAG", spec: "銀灰色防潑水半月斜背包", price: 45000, hasCard: false },
        { id: 4, name: "T-SHIRT SET", spec: "純白排汗短袖T恤組 (自帶專屬小卡x1)", price: 45000, hasCard: true },
        { id: 5, name: "FABRIC POSTER SET", spec: "成員各別款大布海報組 (自帶專屬小卡x1)", price: 32000, hasCard: true },
        { id: 6, name: "DIY SUN CATCHER SET", spec: "拼接風手作太陽捕捉器 (自帶專屬小卡x1)", price: 25000, hasCard: true },
        { id: 7, name: "RAINBOW 10CM DOLL", spec: "彩虹漸層色絨毛玩偶 (有福實款！)", price: 22000, hasCard: false },
        { id: 8, name: "WATER BALL", spec: "角色漂浮夏日衝浪水晶球", price: 18000, hasCard: false },
        { id: 9, name: "RANDOM SUNSHINE DOLL KEYRING", spec: "半透明角色果凍鑰匙圈盲盒", price: 15000, hasCard: false },
        { id: 10, name: "SCRUNCHIE", spec: "絲質光澤薄荷綠大腸髮圈", price: 11000, hasCard: false },
        { id: 11, name: "RANDOM TRADING CARD SET", spec: "官方未公開明星隨機小卡盲盒", price: 6000, hasCard: false },
        { id: 12, name: "4X6 PHOTO SET", spec: "四位成員高畫質大照片寫真組", price: 5000, hasCard: false }
    ];

    const tableBody = document.getElementById('mdTableBody');

    // 初始化渲染表格
    function initTable() {
        const rate = parseFloat(document.getElementById('rateInput').value) || 0.024;
        tableBody.innerHTML = '';
        
        mdItems.forEach(item => {
            const row = document.createElement('tr');
            const twdPrice = Math.round(item.price * rate);
            
            row.innerHTML = `
                <td>
                    <div class="item-name">${item.name}</div>
                    <div class="item-spec">${item.spec}</div>
                    ${item.hasCard ? '<span class="bonus-badge">🎁 內附隨裝自拍卡</span>' : ''}
                </td>
                <td>₩${item.price.toLocaleString()}</td>
                <td id="twd-price-${item.id}">$${twdPrice.toLocaleString()}</td>
                <td style="text-align: center;">
                    <input type="number" class="quantity-input" id="qty-${item.id}" value="0" min="0" oninput="calculateTotal()">
                </td>
                <td style="text-align: right; font-weight: 500;" id="subtotal-${item.id}">₩0</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 核心預算與滿額小卡累增邏輯計算
    function calculateTotal() {
        const rate = parseFloat(document.getElementById('rateInput').value) || 0.024;
        let totalKrw = 0;
        let builtInCards = 0;

        mdItems.forEach(item => {
            const qtyInput = document.getElementById(`qty-${item.id}`);
            const qty = parseInt(qtyInput.value) || 0;
            
            // 防止輸入負數
            if (qty < 0) { qtyInput.value = 0; }

            // 更新單個品項預估台幣單價
            const currentTwdPrice = Math.round(item.price * rate);
            document.getElementById(`twd-price-${item.id}`).innerText = `$${currentTwdPrice.toLocaleString()}`;

            // 計算小計
            const subtotal = item.price * qty;
            totalKrw += subtotal;
            document.getElementById(`subtotal-${item.id}`).innerText = `₩${subtotal.toLocaleString()}`;

            // 統計衣服/海報/捕夢網等「商品本體自帶」的小卡數量
            if (item.hasCard) {
                builtInCards += qty;
            }
        });

        // 計算 70,000 韓元滿額特別自拍小卡累贈張數
        const bonusCards = Math.floor(totalKrw / 70000);
        const totalCards = builtInCards + bonusCards;
        const totalTwd = Math.round(totalKrw * rate);

        // 更新介面數值
        document.getElementById('totalKrw').innerText = `₩${totalKrw.toLocaleString()}`;
        document.getElementById('totalTwd').innerText = `$${totalTwd.toLocaleString()}`;
        document.getElementById('totalCards').innerText = `${totalCards} 張`;
        
        // 特典小卡進度條文字提示
        const bonusInfoText = document.getElementById('bonusInfo');
        if (totalKrw === 0) {
            bonusInfoText.innerText = "未達滿額小卡門檻";
        } else if (totalKrw < 70000) {
            const nextLevel = 70000 - totalKrw;
            bonusInfoText.innerText = `還差 ₩${nextLevel.toLocaleString()} 即可獲得 1 張滿額特別卡！`;
        } else {
            const nextLevel = 70000 - (totalKrw % 70000);
            bonusInfoText.innerText = `🎉 已達門檻！再湊 ₩${nextLevel.toLocaleString()} 多送 1 張！`;
        }

        // 小卡組成明細提示
        document.getElementById('cardDetail').innerText = `明細：商品內附卡 ${builtInCards} 張 + 線上滿額贈卡 ${bonusCards} 張`;
    }

    // 啟動
    initTable();
</script>

</body>
</html>
